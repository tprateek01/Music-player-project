<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    
    <title>Music$ | Digital Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/9afdc9726b.js" crossorigin="anonymous"></script>
</head>
<body>
    <nav>
        <ul>
            <li class="brand">
                <img src="logo.jpeg" alt="logo">
                <span>Music$</span>
            </li>
            <li style="margin-left: auto;">
                <button id="theme-toggle"><i class="fas fa-moon"></i></button>
            </li>
        </ul>
    </nav>

    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Search for a song...">
    </div>

    <div class="container">
        <div class="songList">
            <div class="volume-controls">
                <p id="show-volume">100</p>
                <i class="fas fa-volume-up" id="volume-icon"></i>
                <input type="range" id="volume" min="0" value="100" max="100">
            </div>
            <h1>Your Playlist</h1>
            <div class="songitemContainer">
                <div class="songItem">
                    <img src="" alt="1">
                    <span class="songName"></span>
                    <span class="songToplay"><span class="timestamp"><span class="duration-display">--:--</span> <i id="0" class="far songI fa-circle-play"></i></span></span>
                </div>
                <div class="songItem">
                    <img src="" alt="2">
                    <span class="songName"></span>
                    <span class="songToplay"><span class="timestamp"><span class="duration-display">--:--</span> <i id="1" class="far songI fa-circle-play"></i></span></span>
                </div>
                <div class="songItem">
                    <img src="" alt="3">
                    <span class="songName"></span>
                    <span class="songToplay"><span class="timestamp"><span class="duration-display">--:--</span> <i id="2" class="far songI fa-circle-play"></i></span></span>
                </div>
                <div class="songItem">
                    <img src="" alt="4">
                    <span class="songName"></span>
                    <span class="songToplay"><span class="timestamp"><span class="duration-display">--:--</span> <i id="3" class="far songI fa-circle-play"></i></span></span>
                </div>
                <div class="songItem">
                    <img src="" alt="5">
                    <span class="songName"></span>
                    <span class="songToplay"><span class="timestamp"><span class="duration-display">--:--</span> <i id="4" class="far songI fa-circle-play"></i></span></span>
                </div>
            </div>
        </div>
        </div>

    <div class="songplay">
        <input type="range" class="range" id="myProgress" min="0" value="0" max="100">
        <div class="icons">
            <i id="previous" class="fa-solid fa-3x fa-backward-step"></i>
            <i class="fa-regular fa-3x fa-circle-play" id="playbutton"></i>
            <i id="next" class="fa-solid fa-3x fa-forward-step"></i>
        </div>
        <div class="songInfo">
            <img src="MUSIC.gif" alt="playing" id="songGIF">
            <span id="playInfo">Select a song</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
